# config/shared.yaml
# Hot-editable knobs shared by Systems A & B (see docs/Shared §12).
# These are STARTING DEFAULTS from the docs — tune via backtest, don't trust blindly.
# Editing + reload changes behavior with NO code redeploy. Secrets live in .env (never here).

meta:
  primary_venue: buff163
  currency: CNY
  kill_switch: false          # true = halt ALL buying immediately

# --- Costs & market mechanics -------------------------------------------------
costs:
  buff_fee_pct: 0.015         # BUFF CS2 sell fee CUT 2.5%->1.5% on 2026-04-14 (buff.163.com/news/87397)
  buy_fee_pct: 0.0            # buyer pays listed price (no buyer fee)
  withdrawal_fee_pct: 0.01    # 1% on cash-out (not per-trade); cap raised to 50k CNY/withdrawal
  model_round_trip_fees: true # always deduct fees before calling a trade profitable
cooldown:
  trade_lock_days: 7          # T+7 Valve-side item lock — blocks re-list/sell before unlock
  settlement_days: 7          # BUFF releases SELLER FUNDS only after the 7d Trade Protection
                              # window (since 2025-07-16) — sale proceeds are receivables, not cash
  # note: since ~mid-June 2026 unlocks roll exactly 168h after purchase (no more
  # synchronized daily unlock wave at 15:00 UTC+8)

# --- Capital & exposure -------------------------------------------------------
capital:
  total: 100000               # CNY — total capital (example)
  max_locked_pct: 0.70        # cap on capital simultaneously T+7-locked
position_sizing:              # "layers": 1 layer = 10% of a category's budget
  layers_total: 10
  baseline_deployed_pct: 0.50 # 5 layers baseline; 50% dry powder
  per_item_max_layers: 6      # <=60% of an item's allocation
  per_category_max_layers: 6  # <=60% in one sub-category
  volume_relative_k: 0.35     # max_units = k * avg_daily_volume (0.2–0.5); exit-ability
  never_all_in: true

# --- Market regime → deployment ceiling (Shared §2) ---------------------------
regime_ceilings_pct:
  bull: 0.80
  sideways: 0.50
  bear: 0.30                  # + never average down in bear
  weak: 0.20                  # small items only

# --- Take-profit / stop-loss (hard brackets, Shared §6.3) ---------------------
brackets:
  take_profit_pct: [0.10, 0.15]
  stop_loss_cut_pct: -0.10
  stop_loss_liquidate_pct: -0.18   # -15% to -20% unconditional
  average_down_in_bear: false

# --- Selection hard filters (Shared §4.3) -------------------------------------
selection_filters:
  supply_sweet_spot: [2000, 10000]     # high-conviction / FN
  supply_broad: [10000, 30000]         # safer-liquidity
  supply_hard_exclude_above: 50000
  case_price_min_cny: 80
  min_valid_buy_orders: 3
  min_daily_trades: 10                 # 20–40 = healthy

# --- Volatility-targeted sizing (Shared §11, paper-derived, secondary) --------
volatility_targeting:
  enabled: true
  method: garch_1_1
  size_inverse_to_vol: true            # smaller size when forecast vol high
  target_daily_vol: 0.02               # scale = target / forecast (clamped 0.25-1.5)

# --- Manipulation / blocklist (Shared §8) -------------------------------------
risk_controls:
  blocklist: []               # item hashes to never buy (late-stage pumps)
  allowlist: []               # optional hard-include
  daily_loss_limit_pct: -0.05 # trips the loss-limit latch (halts new buys)
  weekly_loss_limit_pct: -0.10
  halt_days_after_loss_limit: 5        # tripped limit LATCHES this many days
  revenue_cooldown_after_stop_days: 3  # no revenge-trading same item (applies to adds too)

# --- Data sources (keys in .env; names here) ----------------------------------
# Vendor due diligence 2026-07-17 (docs/System-B_Research-Notes.md §3):
#  - cs2.sh: BUFF bid/ask + book counts (ask/bid_volume) at ~5min, float ranges,
#    archive since 2023 w/ total_supply; NO BUFF executed-trade field (volume is
#    proxied from archive aggregate.hourly_volume) — USD only.
#  - csmarketapi DISQUALIFIED for BUFF163 (its enum has buff.market, not buff.cn).
#  - pricempire: the BUFF163 daily price backbone (buff163 + buff163_buy),
#    Enterprise tier, PRICE ONLY — volume/listings history must be self-collected.
data:
  live_feed: cs2.sh                    # CS2SH_API_KEY in .env
  history_feed: pricempire             # HISTORY_API_KEY in .env (csmarketapi has NO buff163)
  refresh_seconds: 300
  pause_trading_on_stale_or_divergent: true
  collect_snapshots: true              # self-collect daily listings/bids/volume forward
                                       # (no vendor sells BUFF volume history)

# --- Execution (path chosen in HANDOFF; credentials in .env) ------------------
execution:
  buff_path: official          # "official" (BUFF API) | "session" (unofficial)
  paper_mode: true             # START HERE — flip to false only after go-live gate
  idempotent_order_ids: true
  reconcile_every_cycle: true
  slippage_pct: 0.005          # paper-fill slippage inside the limit bound
  fill_fraction: 0.25          # max share of one day's executed volume we can fill
