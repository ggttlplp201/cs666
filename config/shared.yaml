# config/shared.yaml
# Hot-editable knobs shared by Systems A & B (see docs/Shared §12).
# These are STARTING DEFAULTS from the docs — tune via backtest, don't trust blindly.
# Editing + reload changes behavior with NO code redeploy. Secrets live in .env (never here).

meta:
  primary_venue: buff163
  currency: CNY
  kill_switch: false          # true = halt ALL buying immediately

# --- Currency / FX (docs Shared §2a) ------------------------------------------
# cs2.sh normalizes ALL prices to USD — including BUFF, which trades in CNY.
# The ledger, fees, and capital are CNY; the normalizer converts feed prices
# USD→CNY at this rate. Never assume a feed price is CNY.
fx:
  feed_currency: USD          # what cs2.sh delivers
  ledger_currency: CNY        # what the ledger/fees/capital are booked in
  usd_cny_rate: 7.25          # static rate for now; TODO(Leon): live FX source

# --- Costs & market mechanics -------------------------------------------------
costs:
  buff_fee_pct: 0.025         # single-side BUFF fee (~2.5%)
  model_round_trip_fees: true # always deduct fees before calling a trade profitable
cooldown:
  trade_lock_days: 7          # T+7 — hard constraint; blocks adds/exits before unlock

# --- Capital & exposure -------------------------------------------------------
capital:
  total: 100000               # CNY — total capital (example)
  max_locked_pct: 0.70        # cap on capital simultaneously T+7-locked
position_sizing:              # "layers": 1 layer = 10% of a category's budget
  layers_total: 10
  baseline_deployed_pct: 0.50 # 5 layers baseline; 50% dry powder
  per_item_max_layers: 6      # <=60% of an item's allocation
  per_category_max_layers: 6  # <=60% in one sub-category
  volume_relative_k: 0.35     # max_units = k * avg_daily_volume (0.2–0.5); exit-ability
  never_all_in: true

# --- Market regime → deployment ceiling (Shared §2) ---------------------------
regime_ceilings_pct:
  bull: 0.80
  sideways: 0.50
  bear: 0.30                  # + never average down in bear
  weak: 0.20                  # small items only

# --- Take-profit / stop-loss (hard brackets, Shared §6.3) ---------------------
brackets:
  take_profit_pct: [0.10, 0.15]
  stop_loss_cut_pct: -0.10
  stop_loss_liquidate_pct: -0.18   # -15% to -20% unconditional
  average_down_in_bear: false

# --- Selection hard filters (Shared §4.3) -------------------------------------
# ⚠ total_supply_* thresholds are TOTAL EXISTING QUANTITY (存世量) — NOT the
# feed's ask_volume, which is only the current LISTING COUNT (a small
# fraction of supply). Never map these to listings. True total_supply needs
# cs2.sh /v1/archive/history (Scale tier) — unavailable in Phase 1.
selection_filters:
  total_supply_sweet_spot: [2000, 10000]     # high-conviction / FN
  total_supply_broad: [10000, 30000]         # safer-liquidity
  total_supply_hard_exclude_above: 50000
  case_price_min_cny: 80
  min_valid_buy_orders: 3
  min_daily_trades: 10                 # 20–40 = healthy; NOT enforceable on
                                       # cs2.sh Developer tier (no executed volume)
  allow_unknown_volume: false          # false = refuse buys when volume data is
                                       # missing (conservative); true = trade on
                                       # depth alone with bid-count sizing

# --- Volatility-targeted sizing (Shared §11, paper-derived, secondary) --------
volatility_targeting:
  enabled: true
  method: garch_1_1
  size_inverse_to_vol: true            # smaller size when forecast vol high

# --- Manipulation / blocklist (Shared §8) -------------------------------------
risk_controls:
  blocklist: []               # item hashes to never buy (late-stage pumps)
  allowlist: []               # optional hard-include
  daily_loss_limit_pct: -0.05 # trips kill_switch
  weekly_loss_limit_pct: -0.10
  revenue_cooldown_after_stop_days: 3  # no revenge-trading same item

# --- Indicator parameters (Shared §3) — added by Builder 1, starting defaults --
indicators:
  bollinger_window: 20
  bollinger_num_std: 2.0
  volume_baseline_window: 14      # snapshots used for the volume baseline
  flat_price_pct: 0.01            # |change| below this counts as "flat"
  volume_high_ratio: 1.5          # volume ≥ ratio×baseline counts as "volume up"
  volume_low_ratio: 0.7           # volume ≤ ratio×baseline counts as "volume down"

# --- Market-regime classifier (Shared §2) — added by Builder 1 -----------------
regime:
  breadth_window: 20              # snapshots for middle-band/MA breadth
  bull_breadth_min: 0.60          # share of primaries above middle band
  bear_breadth_max: 0.35
  weak_volume_ratio_max: 0.50     # aggregate volume vs baseline ⇒ weak/low-liquidity

# --- Data sources (keys in .env; names here) — phased strategy, Shared §2a ----
data:
  phase: 1                             # 1 = free validation; 2 = paid history/archive
  live_feed: cs2.sh                    # CS2SH_API_KEY in .env
  live_feed_tier: developer            # ONLY /v1/prices/latest: bid/ask + depth.
                                       # NO executed volume / float / total_supply
                                       # (those are Scale tier — Phase 2 decision)
  history_feed: steam_pricehistory     # Phase 1: FREE Steam daily median + qty sold
                                       # (STEAM_LOGIN_SECURE cookie in .env).
                                       # Phase 2 candidates: cs2.sh Scale archive,
                                       # CSPriceAPI, csmarketapi, SteamAnalyst.
  refresh_seconds: 300
  pause_trading_on_stale_or_divergent: true
  snapshot_poller:                     # poll /v1/prices/latest and persist forever —
    enabled: true                      # accumulates our own BUFF depth history from
    db_path: var/market.db             # day one; data not captured is lost permanently
  steam_history:                       # Phase-1 backtest ingestion (src/shared/steam_history.py)
    items_file: config/steam_backtest_items.txt
    cache_dir: var/steam_history
    request_gap_seconds: 4.0           # Steam 429s aggressively; be polite
    backoff_start_seconds: 60.0        # exponential from here on 429, max 5 retries
    source_tag: steam                  # store rows tagged so Steam never mixes with BUFF

# --- Execution (path chosen in HANDOFF; credentials in .env) ------------------
execution:
  buff_path: official          # "official" (BUFF API) | "session" (unofficial)
  paper_mode: true             # START HERE — flip to false only after go-live gate
  idempotent_order_ids: true
  reconcile_every_cycle: true
