# config/trade_up_collections.yaml
# CS2 trade-up collection → gold-output map (rules table §4 todo).
#
# ⚠⚠ RESEARCHED BY CLAUDE, NOT YET VERIFIED BY LEON. Every entry below is from
# public sources (listed under `sources:`), assembled 2026-07-19. The
# case→gold-TYPE backbone (knife vs glove per case) is high-confidence and
# well-documented. The per-case COVERT skin lists are verified only where
# `covert_verified: true`; entries with `covert_verified: false` have the
# gold-type confirmed but the red-skin list still needs your check/fill.
# DO NOT trade off this until verified.
#
# MECHANIC (late-2025 "Retake" update — the change the rules table's
# 2025-10-22 event models): 5 Covert (red) skins from the SAME case trade up
# to one gold-tier item (knife OR glove) from that case's rare-special pool.
# Output float = average of the 5 inputs. StatTrak in → StatTrak out (knives
# only; gloves have no StatTrak). This is why the event crashed knives/gloves
# (supply expands) and pumped cheap Coverts (they became viable fuel).
#
# COLLECTION-AWARENESS (what the rule needs): only Coverts in a case whose
# gold tier is knives/gloves are affected. MAP COLLECTIONS (Dust II, Mirage,
# Cache, …) have Covert skins but NO gold output — their reds do NOT react to
# a gold trade-up change. See `map_collections_no_gold` at the bottom.

meta:
  researched: 2026-07-19
  verified_by_leon: false
  sources:
    - https://tradeit.gg/blog/all-knife-cases-in-cs2/
    - https://tradeit.gg/blog/all-glove-cases-in-cs2/
    - https://cs.money/blog/trade/cs2-contract-guide-what-skins-give-which-knife/
    - https://skin.land/blog/cs-trade-up-gloves-guide-which-skins-give-which-gloves/
    - https://stash.clash.gg/skin-rarity/Covert   # per-case covert verification
    - https://www.hltv.org/news/43004/knife-trade-ups-and-return-of-retakes-headline-cs2-update

