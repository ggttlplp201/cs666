# config/trade_up_collections.yaml
# CS2 trade-up collection → gold-output map. Rules table §4 dependency.
#
# VERIFICATION STATUS per entry:
#   covert_verified: true         → corroborated against stash.clash.gg case pages
#                                   (cross-checked with a 2nd source where available)
#   covert_verified: leon         → Leon confirmed personally
#   covert_verified: partial      → some cases in the family verified, others listed
#                                   under unverified_legacy_cases at the bottom.
#
# NO GUESSES APPEAR IN THIS FILE. Every Covert listed is sourced. Anything not
# confirmed is named in unverified_legacy_cases and left empty rather than filled.
#
# ============================================================================
# MECHANIC — corrected 2026-07-19. Two points here were WRONG in the first
# draft and would have broken EV calculation. Read before using.
# ============================================================================
#
# 1. COVERT TRADE-UP: 5 Covert skins → 1 gold-tier item (knife or gloves).
#    All other rarity tiers still use 10 inputs. Covert is the exception.
#
# 2. ★ MIXING COLLECTIONS IS ALLOWED ★
#    Each input carries 1/5 = 20% of the collection weight. Output collection is
#    chosen PROPORTIONALLY to input composition:
#        5 from A            → 100% collection A
#        3 from A + 2 from B → 60% A / 40% B
#    Same-collection is a CHOICE for control, not a requirement. Mixing is a
#    strategy lever: cheap fuel from one case can point at a high-value pool in
#    another. Any EV model assuming single-collection inputs is wrong.
#
# 3. ★ DILUTION IS THE ECONOMIC DRIVER ★
#    A Covert's crafting value = which gold pool it points into x how many
#    outcomes that pool has. Single-model pools (Breakout = Butterfly only) are
#    premium fuel; wide pools (Chroma = 5 models incl. cheap Gut Knife) are cheap
#    fuel. This — not "is it red" — is why Oct 2025 repriced some Coverts 10-20x
#    and others barely. NOTE: concentration only helps if the model is VALUABLE
#    (Shadow Case is single-model but Shadow Daggers are cheap).
#
# 4. StatTrak: 5 ST inputs → ST KNIFE only (gloves have no StatTrak).
#    Cannot mix ST and non-ST in one contract.
#
# 5. FLOAT: output float = normalized average of the 5 input floats, mapped onto
#    the output skin's own min/max float range. Wear drives 2-10x value spread.
#
# 6. SOUVENIR items cannot be used in any trade-up. Exclude from input scanning.
#
# 7. MAP/SOUVENIR COLLECTIONS HAVE NO GOLD TIER — their Coverts do not react to
#    gold trade-up changes. See map_collections_no_gold (the exclusion set).
#
# OPEN QUESTION (verify in client — affects mixing math):
#   What happens to the weight of an input from a no-gold collection? Does that
#   20% produce nothing, or is the input rejected? Confirm before modelling
#   mixed contracts that include map-collection Coverts.

meta:
  researched: 2026-07-19
  primary_source: https://stash.clash.gg   # per-case "The Coverts are X and Y"
  cross_checked:
    - https://wiki.cs.money/cases/
    - https://cs2data.gg/cases/
    - https://dmarket.com/blog/all-cs2-knife-cases/
    - https://steamcommunity.com/sharedfiles/filedetails/?id=2952631801  # knife families
  coverage: >
    All 7 glove cases verified. All modern knife cases verified (29 cases total).
    ONLY remaining gaps: the 6 cases in unverified_legacy_cases at the bottom.
    No guesses appear anywhere in this file — an entry is either sourced or empty.
  corrections_applied:
    - "Clutch Case: USP-S | Cortex removed (it is Classified, not Covert)"
  independent_corroboration:
    # Claude re-verified Leon's update 2026-07-19 against fresh sources
    # (stash.clash.gg per-case pages, csgodatabase, cs.money wiki). Result:
    # every checked entry CONFIRMED. Nothing contradicted.
    date: 2026-07-19
    mechanic_claims_confirmed:
      - "Covert trade-up takes 5 inputs (all other tiers take 10) — confirmed"
      - "Mixing collections IS allowed; output collection weighted by input
         composition (3A+2B → 60/40) — confirmed, corrects the earlier draft"
      - "Clutch USP-S Cortex = Classified not Covert — confirmed"
    coverts_confirmed:   # cases independently re-checked, all correct
      [Glove Case, Operation Hydra Case, Clutch Case, Operation Broken Fang Case,
       Snakebite Case, Recoil Case, Revolution Case, Operation Breakout Weapon Case,
       Huntsman Weapon Case, Dreams & Nightmares Case, Fever Case, Kilowatt Case,
       Fracture Case, Operation Riptide Case, Prisma Case, Prisma 2 Case]
    not_independently_checked:
      - "glove_pool contents and value_tier/concentration annotations (Leon's
         qualitative judgments, not covert-identity facts)"
      - "unverified_legacy_cases (empty by design)"
      - "OPEN QUESTION on no-gold-collection input weighting (needs in-client test)"

