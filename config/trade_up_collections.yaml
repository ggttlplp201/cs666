# =============================================================================
# EV MODEL GUIDANCE (for the trade-up calculator)
# =============================================================================
ev_model:
  contract_ev: >
    EV = Σ over outcomes [ P(outcome) x price(outcome, projected wear) ]
         − Σ input costs − fees.
    P(collection) = fraction of the 5 inputs from that collection.
    P(specific skin | collection) = distribution over that collection's gold
    pool — VERIFY whether uniform across models/finishes before assuming.
  key_levers:
    - concentration x value_tier: single-model AND valuable = best craft target
    - cheap fuel: lowest-cost Coverts pointing into a high-value pool
    - float: low-float inputs push output toward FN/MW (2-10x value swing)
    - mixing: direct weight at a high-value pool using cheap fuel elsewhere
    - StatTrak: separate market; ST inputs → ST knives only
  screening_order:
    - 1. compute cost-per-20%-weight for every Covert (its "fuel price")
    - 2. compute expected output value per collection pool
    - 3. rank collections by (expected output value / fuel price)
    - 4. check liquidity + spread on BOTH the inputs and the likely outputs
  do_not_assume:
    - that all Coverts respond to gold trade-up news (map collections do not)
    - that same-collection is required (it is not)
    - uniform outcome probability without verifying pool composition
    - that concentration implies value (see Shadow Daggers)
