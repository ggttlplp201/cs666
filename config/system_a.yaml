# config/system_a.yaml — Event-Driven / Reactive (Builder 1)
# Inherits config/shared.yaml. Starting defaults; tune via event-study backtest.

style: right_side          # momentum; buy on confirmed move completable within one CD
momentum_chase_max_layers: 2   # <=20% per item on a chase (overrides shared per-item cap down)

# --- Social monitor & signal bus (Shared §7) ---------------------------------
monitor:
  confidence_min_to_act: 0.70    # min corroborated confidence to fire reactive pipeline
  tiers_consumed: [1, 2]         # A uses raw leaks (1) + confirmed (2); Tier 3 is B's
  corroboration_min_sources: 3
  signal_decay_hours: 48
  # account allowlist + platform scrapers configured in code/secrets, not here

# --- Right-side confirmation filters (Shared §3.1/§3.3) -----------------------
confirmation:
  require_volume_and_price_up: true    # pattern 3 (healthy accumulation)
  require_bandwidth_widening: true     # trend accelerating
  reject_price_up_volume_down: true    # pattern 4 (weak rally / one-wave pump)

# --- Event-class handling (Shared §11) ---------------------------------------
event_classes:
  balance_meta_updates: price_alpha    # real, durable repricings — A's core
  calendar_esports_events: volume_only # Steam sales/Majors/tourneys/ops = liquidity, NOT price entries

# --- Market-data structural-break detector (System A §4.1a) -------------------
break_detector:
  enabled: true
  method: cusum            # or bai_perron on rolling window
  fires_reactive_pipeline: true
  triggers_retrain_alarm: true
  std_window: 20           # rolling window for return standardization
  drift_k: 0.5             # CUSUM slack (in std units)
  threshold_h: 5.0         # CUSUM alarm threshold (in std units)
  emitted_confidence: 0.75 # confidence of the MARKET_BREAK signal on the bus

# --- Position management (Shared §3 "market rhymes" + §6.3, System A layer) ---
# Every rule individually toggleable and individually attributed in provenance.
# ⚠ Numeric thresholds are UNVALIDATED defaults — the docs give qualitative
# rules ("large rise", "low volume") without numbers. The exit study measures
# each rule's edge; do not treat these defaults as calibrated.
position_management:
  thesis_invalidation_days: 14   # exit if predicted repricing hasn't shown by day N
  thesis_min_progress_pct: 0.0   # "shown" = price above entry by at least this
  patient_exit:                  # exits list at the ask (System A exit isn't urgent)
    grace_days: 5                # unfilled after grace → cross down to the bid
  rules:                         # EXIT rules
    stop_loss: true              # Shared §6.3 hard stop — overrides everything
    take_profit: true            # Shared §6.3 +10–15%; note: truncates runners
    surge_euphoria: true         # vertical surge → sell into strength
    large_consecutive_rises: true
    upper_band_green: true       # upper-band touch + green (high-vol up) bar
    slow_decline_high_volume: true   # distribution → evacuate
  hold_rules:                    # HOLD/suppress rules (attributed, not exits)
    consecutive_small_rises: true
    sharp_drop_low_volume: true  # shakeout — hold
    upper_band_no_green: true    # riding the band — hold
    big_crash_no_sell: true      # don't dump into a crash (suppresses TA exits,
                                 # never the hard stop)
  thresholds:                    # UNVALIDATED defaults (see header note)
    surge_1d_pct: 0.07
    surge_3d_pct: 0.12
    small_rise_max_pct: 0.03
    large_rise_day_pct: 0.05
    crash_1d_pct: -0.10
    sharp_drop_pct: -0.05
    slow_decline_3d_band: [-0.10, -0.02]
    upper_band_pct_b: 0.95
    green_bar_volume_ratio: 1.5
    low_volume_ratio: 0.7

# --- Anti-monopoly concentration tracker (Leon's predictive thesis) -----------
concentration:
  # Classes Valve has ALREADY opened access to (excluded from the "next target"
  # call). Knives + gloves both got covert→gold trade-up access on 2025-10-22.
  opened_classes: [Knife, Gloves]

# --- Trade-up event class (the one durable, spread-irrelevant System A play) --
# 2025-10-22 covert→gold repriced the whole gold-case ladder +164% median over
# ~60d (validated: durable, spread-irrelevant, no speed race, no fuel-selection
# edge). Trade-up lots hold LONG — these keys override position_management for
# them (deep-merged): no early take-profit (it would truncate a +164% runner),
# long thesis window; keep the hard stop and euphoria/distribution exits.
trade_up_collection_map: config/trade_up_collections.yaml
trade_up_holding:
  thesis_invalidation_days: 90     # give the durable repricing room (vs 14 default)
  rules:
    take_profit: false             # do NOT cap the runner at +10-15%

# --- Rules table (content supplied by Builder 1; file path here) --------------
rules_table_path: config/rules_table_a.yaml   # substitute pairs, event rules, labeled events

# --- Rule gating (researched table wiring) ------------------------------------
rules_gating:
  # Rules here are LOG-ONLY regardless of confidence.
  # 2026-07-18 OUT-OF-SAMPLE event study (Steam data, Steam 15% fee, lock
  # from fill, in-sample 2022-11-18 excluded): NO rule cleared fees+lock on
  # the venue tested — OOS mean -10.4% net (placebo -14.3%). Direction
  # prediction stayed strong (ct_rifle 10/12) and the BUFF-fee counterfactual
  # is marginally positive, but per policy anything failing net of fees+lock
  # is DO-NOT-TRADE until re-validated on BUFF-native data (the poller is
  # accumulating it). Re-enable only after a BUFF-priced study passes.
  disabled_rules: [map_pool_change, weapon_balance_change]
  # scoped_rifles additionally failed DIRECTION (0/2 both runs).
  disabled_pairs: [scoped_rifles, ct_rifle]
  # trade_up collection→gold-output map (rules table §4 todo — Leon supplies).
  # While empty, trade_up_pool_change candidates are log-only.
  collections_with_gold: []
