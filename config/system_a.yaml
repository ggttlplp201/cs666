# config/system_a.yaml — Event-Driven / Reactive (Builder 1)
# Inherits config/shared.yaml. Starting defaults; tune via event-study backtest.

style: right_side          # momentum; buy on confirmed move completable within one CD
momentum_chase_max_layers: 2   # <=20% per item on a chase (overrides shared per-item cap down)

# --- Social monitor & signal bus (Shared §7) ---------------------------------
monitor:
  confidence_min_to_act: 0.70    # min corroborated confidence to fire reactive pipeline
  tiers_consumed: [1, 2]         # A uses raw leaks (1) + confirmed (2); Tier 3 is B's
  corroboration_min_sources: 3
  signal_decay_hours: 48
  # account allowlist + platform scrapers configured in code/secrets, not here

# --- Right-side confirmation filters (Shared §3.1/§3.3) -----------------------
confirmation:
  require_volume_and_price_up: true    # pattern 3 (healthy accumulation)
  require_bandwidth_widening: true     # trend accelerating
  reject_price_up_volume_down: true    # pattern 4 (weak rally / one-wave pump)

# --- Event-class handling (Shared §11) ---------------------------------------
event_classes:
  balance_meta_updates: price_alpha    # real, durable repricings — A's core
  calendar_esports_events: volume_only # Steam sales/Majors/tourneys/ops = liquidity, NOT price entries

# --- Market-data structural-break detector (System A §4.1a) -------------------
break_detector:
  enabled: true
  method: cusum            # or bai_perron on rolling window
  fires_reactive_pipeline: true
  triggers_retrain_alarm: true
  std_window: 20           # rolling window for return standardization
  drift_k: 0.5             # CUSUM slack (in std units)
  threshold_h: 5.0         # CUSUM alarm threshold (in std units)
  emitted_confidence: 0.75 # confidence of the MARKET_BREAK signal on the bus

# --- Rules table (content supplied by Builder 1; file path here) --------------
rules_table_path: config/rules_table_a.yaml   # substitute pairs, event rules, labeled events

# --- Rule gating (researched table wiring) ------------------------------------
rules_gating:
  # Rules here are LOG-ONLY regardless of confidence.
  # 2026-07-18 OUT-OF-SAMPLE event study (Steam data, Steam 15% fee, lock
  # from fill, in-sample 2022-11-18 excluded): NO rule cleared fees+lock on
  # the venue tested — OOS mean -10.4% net (placebo -14.3%). Direction
  # prediction stayed strong (ct_rifle 10/12) and the BUFF-fee counterfactual
  # is marginally positive, but per policy anything failing net of fees+lock
  # is DO-NOT-TRADE until re-validated on BUFF-native data (the poller is
  # accumulating it). Re-enable only after a BUFF-priced study passes.
  disabled_rules: [map_pool_change, weapon_balance_change]
  # scoped_rifles additionally failed DIRECTION (0/2 both runs).
  disabled_pairs: [scoped_rifles, ct_rifle]
  # trade_up collection→gold-output map (rules table §4 todo — Leon supplies).
  # While empty, trade_up_pool_change candidates are log-only.
  collections_with_gold: []
